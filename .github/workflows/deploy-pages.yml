name: Deploy Pages

on:
  push:
    branches:
      - main  # your default branch

permissions:
  contents: read
  pages: write
  id-token: write  # required for GitHub Pages deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # opt into Node.js 24 for all actions

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'  # use Node 24 for future-proofing

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build  # replace with your build command if different

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4