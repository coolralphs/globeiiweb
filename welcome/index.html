<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome - Globeii</title>

  <!-- Bootstrap CSS -->
  <link href="../css/styles.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../supabase-config.js"></script>
</head>
<body class="d-flex flex-column min-vh-100">

  <!-- HEADER -->
  <div id="header-placeholder"></div>

  <!-- WELCOME CONTENT -->
  <main class="flex-fill container my-5 text-center" id="welcomeContent" style="display:none;">
    <h1 id="welcomeTitle" class="mb-4">Welcome!</h1>
    <p id="welcomeMessage" class="lead mb-4">Loading...</p>

    <!-- App download buttons -->
    <div class="mb-4">
      <a href="https://apps.apple.com/app/idYOUR_APPLE_ID" class="btn btn-primary me-2" target="_blank">
        <i class="fa-brands fa-apple"></i> Download iOS App
      </a>
      <a href="https://play.google.com/store/apps/details?id=YOUR_ANDROID_PACKAGE" class="btn btn-success" target="_blank">
        <i class="fa-brands fa-android"></i> Download Android App
      </a>
    </div>

    <!-- Continue registration on web -->
    <div>
      <a href="../web-registration.html" class="btn btn-outline-secondary">Continue Registration on Web</a>
    </div>
  </main>

  <!-- FOOTER -->
  <div id="footer-placeholder"></div>

  <!-- JS -->
  <script src="../js/layout.js"></script>
  <script src="../js/header.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    (async () => {
      try {
        const { data: { user } } = await supabaseClient.auth.getUser();

        if (!user) {
          // Redirect to login if not signed in
          window.location.href = '../login.html?redirectTo=welcome/index.html';
          return;
        }

        // Show welcome content
        const content = document.getElementById('welcomeContent');
        content.style.display = 'block';

        // Set welcome message
        document.getElementById('welcomeTitle').textContent = `Welcome ${user.email}!`;
        document.getElementById('welcomeMessage').textContent =
          'You have accepted the invitation to join Globeii. Please download the app to complete your registration, or continue on the web.';

      } catch (err) {
        console.error('Error loading user:', err);
        document.getElementById('welcomeContent').style.display = 'block';
        document.getElementById('welcomeMessage').textContent =
          'Error loading account info. Please try again or continue on the web.';
      }
    })();
  </script>
</body>
</html>
